<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rota Esperta 🛵</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="cabecalho">
    <h1>🛵 Rota Esperta</h1>
    <p class="subtitulo">Entregue na ordem certa, gaste menos combustível</p>
  </header>

  <main class="conteudo">

    <!-- ===== 1. Ponto de origem (a lanchonete) ===== -->
    <section class="cartao">
      <h2>🏠 Lanchonete (partida e chegada)</h2>
      <label for="input-lanchonete">Endereço da lanchonete</label>
      <input type="text" id="input-lanchonete"
             placeholder="Ex: Av. Brasil, 500, Centro">

      <label for="input-cidade">Cidade base <span class="opcional">(opcional, ajuda a achar os endereços)</span></label>
      <input type="text" id="input-cidade" placeholder="Ex: Campinas, SP">
    </section>

    <!-- ===== 2. Adicionar entregas ===== -->
    <section class="cartao">
      <h2>📦 Adicionar entrega</h2>
      <form id="form-entrega">
        <label for="input-endereco">Endereço</label>
        <input type="text" id="input-endereco"
               placeholder="Ex: Rua das Flores, 100, Jardim América" required>

        <label for="input-complemento">Complemento <span class="opcional">(apto, bloco...)</span></label>
        <input type="text" id="input-complemento" placeholder="Ex: Apto 302, Bloco B">

        <button type="submit" class="btn btn-secundario">➕ Adicionar à lista</button>
      </form>
      <p class="dica">💡 A <strong>1ª entrega</strong> adicionada é tratada como a <strong>prioritária</strong>.</p>
    </section>

    <!-- ===== 3. Lista de entregas adicionadas ===== -->
    <section class="cartao" id="cartao-lista" hidden>
      <h2>📋 Entregas (<span id="contador">0</span>)</h2>
      <ul id="lista-entregas" class="lista-entregas"></ul>
      <button id="btn-otimizar" class="btn btn-principal">🗺️ Otimizar rota</button>
    </section>

    <!-- ===== Mensagens de status ===== -->
    <p id="status" class="status" hidden></p>

    <!-- ===== 4. Resultado ===== -->
    <section class="cartao" id="cartao-resultado" hidden>
      <h2>✅ Rota otimizada</h2>
      <p id="resumo-rota" class="resumo"></p>
      <ol id="resultado-ordem" class="resultado-ordem"></ol>
      <a id="link-maps" class="btn btn-principal" target="_blank" rel="noopener">
        🚀 Abrir rota no Google Maps
      </a>
    </section>

  </main>

  <footer class="rodape">
    <p>Rota Esperta — versão 0.2 (Etapa 2)</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
